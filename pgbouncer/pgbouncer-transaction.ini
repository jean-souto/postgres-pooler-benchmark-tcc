; PgBouncer — modo TRANSACTION
; Suporte a prepared statements (PgBouncer 1.21+) ativado via max_prepared_statements

[databases]
tcc = host=postgres port=5432 dbname=tcc

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
; MD5 client-side: paridade com PgCat (que não suporta SCRAM client). PG18
; servidor está com password_encryption=md5; userlist.txt regenerado.
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
admin_users = tcc
stats_users = tcc

; --- Pooling ---
pool_mode = transaction
max_prepared_statements = 100

; --- Limites ---
; 1100 (não 1000) — bug conhecido: max_client_conn=1000 colide com clients=1000
; do pgbench, que usa N+1 conexões (1 dispatcher + N workers). Margem garante
; que o pgbench não seja rejeitado.
max_client_conn = 1100
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 0
max_user_connections = 0

; --- Timeouts ---
; 10min — evita re-handshake artificial entre experimentos consecutivos
server_idle_timeout = 600
server_lifetime = 3600
query_wait_timeout = 120
client_idle_timeout = 0

; --- Compatibilidade ---
ignore_startup_parameters = extra_float_digits

; --- Logging ---
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
