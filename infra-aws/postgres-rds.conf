# ============================================================
# postgres-rds.conf — REFERÊNCIA (não consumido pelo Terraform)
# ============================================================
# Este arquivo documenta os tunings aplicados via aws_db_parameter_group.postgres18
# em main.tf. RDS NÃO aceita postgresql.conf como arquivo — só via parameter group.
# Mantido aqui pra revisão lado-a-lado com postgres/postgresql.conf (docker local).
#
# Equivalência:
#
#   docker local                          | RDS parameter group
#   --------------------------------------|----------------------------------------------
#   max_connections = 415                 | LEAST({DBInstanceClassMemory/9531392},5000)
#                                         |   => db.t3.medium (~4 GiB) ~= 415
#   shared_buffers = 1024MB               | {DBInstanceClassMemory/32768}  (páginas 8 KiB
#                                         |   => 1 GiB em db.t3.medium)
#   effective_cache_size = 3072MB         | {DBInstanceClassMemory*3/16384}  (~3 GiB)
#   work_mem = 4MB                        | 4096 (KB)
#   maintenance_work_mem = 256MB          | 262144 (KB)
#   random_page_cost = 1.1                | 1.1
#   effective_io_concurrency = 200        | 200
#   default_statistics_target = 100       | 100
#   shared_preload_libraries =            | pg_stat_statements
#     'pg_stat_statements'                |   (apply_method = pending-reboot)
#   pg_stat_statements.track = all        | all
#   pg_stat_statements.max = 10000        | 10000
#   pg_stat_statements.track_utility = off| 0
#   track_io_timing = on                  | 1
#   log_lock_waits = on                   | 1
#   log_temp_files = 0                    | 0
#   log_checkpoints = on                  | 1
#   log_min_duration_statement = -1       | -1
#
# Diferenças intencionais (RDS gerencia ou exige):
#   - listen_addresses: gerenciado pelo RDS, não exposto
#   - logging_collector: RDS sempre usa CloudWatch/file, não configurável
#   - log_destination: idem
#   - wal_buffers, checkpoint_*: deixar default RDS (auto-tuned por instance class)
#
# Como verificar pós-deploy:
#   psql -h <rds_endpoint> -U tcc -d tcc -c "
#     SELECT name, setting, unit, source
#     FROM pg_settings
#     WHERE name IN (
#       'max_connections','shared_buffers','effective_cache_size',
#       'work_mem','random_page_cost','track_io_timing','log_lock_waits',
#       'shared_preload_libraries','pg_stat_statements.track'
#     ) ORDER BY name;
#   "
