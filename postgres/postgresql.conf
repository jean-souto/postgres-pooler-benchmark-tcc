# ====================================================
# postgresql.conf — TCC Connection Poolers
# Configuração para mimetizar AWS RDS db.t3.medium
# (4 GB RAM, 2 vCPU, EBS gp3 / SSD)
# ====================================================

# --- Connections ---
max_connections = 415                # RDS default para db.t3.medium
                                     # Fórmula RDS: LEAST(DBInstanceClassMemory/9531392, 5000)

# --- Memory ---
shared_buffers = 1024MB              # ~25% RAM (RDS default)
effective_cache_size = 3072MB        # ~75% RAM
work_mem = 4MB                       # Conservador
maintenance_work_mem = 256MB
wal_buffers = 16MB

# --- Checkpoints / WAL ---
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 80MB

# --- Storage cost (SSD / gp3) ---
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Statistics ---
default_statistics_target = 100

# --- Extensions ---
shared_preload_libraries = 'pg_stat_statements'

pg_stat_statements.track = all
pg_stat_statements.max = 10000
pg_stat_statements.track_utility = off

# --- Logging (default: silencioso; ativar por experimento se necessário) ---
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = -1      # ligar pontualmente: SET para 0 dentro do experimento
log_line_prefix = '%m [%p] %q%u@%d '
log_lock_waits = on                  # útil pra detectar contenção
log_temp_files = 0
log_checkpoints = on

# --- Connectivity ---
listen_addresses = '*'

# --- Authentication ---
# Limitação metodológica: PgCat 1.2 e Odyssey 1.4 não suportam SCRAM-SHA-256
# client-side. Pra paridade entre os 5 setups (none, pgbouncer-tx,
# pgbouncer-session, pgcat-tx, pgcat-session) usamos MD5 globalmente.
# Tratado em §X da tese como ameaça à validade externa (cifragem de wire mais
# fraca, mas experimentos rodam em rede privada / loopback Docker).
password_encryption = md5

# --- Track timing (importante pra pg_stat_statements ter dados ricos) ---
track_io_timing = on
track_functions = pl
